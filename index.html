<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Aplikasi Penjualan Online</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
input,button{margin:5px;padding:8px}
.box{border:1px solid #ccc;padding:10px;margin-top:10px;background:#fff}
</style>
</head>
<body>

<h2>Aplikasi Penjualan ONLINE</h2>

<h3>Tambah Barang</h3>
<input id="nama" placeholder="Nama Barang">
<input id="stok" type="number" placeholder="Stok">
<input id="harga" type="number" placeholder="Harga">
<input id="modal" type="number" placeholder="Modal">
<button onclick="tambahBarang()">Tambah</button>

<h3>Daftar Barang</h3>
<div id="listBarang"></div>

<h3>Penjualan</h3>
<div id="listJual"></div>

<h3>Total Profit: <span id="totalProfit">0</span></h3>

<script>
// 🔥 CONFIG FIREBASE (WAJIB DIGANTI)
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "ISI_PROJECT.firebaseapp.com",
  projectId: "ISI_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function tambahBarang(){
  await db.collection("barang").add({
    nama:nama.value,
    stok:parseInt(stok.value),
    harga:parseInt(harga.value),
    modal:parseInt(modal.value)
  });
}

async function jual(id,data){
  let qty=parseInt(prompt('Jumlah'));
  if(data.stok<qty) return alert('Stok kurang');

  await db.collection("barang").doc(id).update({
    stok:data.stok-qty
  });

  let t=new Date().toISOString().split('T')[0];
  let profit=(data.harga-data.modal)*qty;

  await db.collection("penjualan").add({
    nama:data.nama,qty,tanggal:t,total:data.harga*qty,profit
  });
}

function loadData(){
  db.collection("barang").onSnapshot(snap=>{
    listBarang.innerHTML='';
    snap.forEach(doc=>{
      let b=doc.data();
      listBarang.innerHTML+=`<div class='box'>${b.nama}<br>Stok:${b.stok}<br><button onclick='jual("${doc.id}",${JSON.stringify(b)})'>Jual</button></div>`;
    });
  });

  db.collection("penjualan").onSnapshot(snap=>{
    listJual.innerHTML='';
    let total=0;

    snap.forEach(doc=>{
      let p=doc.data();
      total+=p.profit;
      listJual.innerHTML+=`<div class='box'>${p.nama} - ${p.tanggal}<br>Qty:${p.qty}<br>Total:${p.total}<br>Profit:${p.profit}</div>`;
    });

    totalProfit.innerText=total;
  });
}

loadData();
</script>

</body>
</html>
